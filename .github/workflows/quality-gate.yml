name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-static-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run static audit
        shell: powershell
        run: |
          .\tests\code-quality-check.ps1 -RepoRoot $PWD.Path

  documentation-contract:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run documentation contract check
        shell: powershell
        run: |
          .\tests\documentation-contract-check.ps1 -RepoRoot $PWD.Path

  powershell-compatibility:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run PowerShell compatibility check
        shell: powershell
        run: |
          .\tests\powershell-compatibility-check.ps1 -RepoRoot $PWD.Path

  linux-shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Linux shell syntax
        shell: pwsh
        run: |
          .\tests\bash-syntax-check.ps1 -RepoRoot $PWD.Path

  smoke-contracts:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run non-live smoke contracts
        shell: powershell
        run: |
          .\tests\az-vm-smoke-tests.ps1 -RepoRoot $PWD.Path

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.11/actionlint_1.7.11_linux_amd64.tar.gz
          tar -xzf actionlint.tar.gz
          ./actionlint -color
